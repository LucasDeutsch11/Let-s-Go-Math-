<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Dashboard - Let's Go Math!</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f5f7fb; margin: 0; padding: 0; }
        header { background: #1f4bb8; color: white; padding: 18px 20px; }
        .container { max-width: 700px; margin: 30px auto; background: white; padding: 24px; border-radius: 10px; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        h1 { margin: 0; font-size: 24px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 10px; border-bottom: 1px solid #e3e8f5; text-align: left; }
        th { background: #f5f7fb; }
        .progress-bar-bg { background: #e3e8f5; border-radius: 6px; height: 18px; width: 100%; }
        .progress-bar { background: #1f4bb8; height: 18px; border-radius: 6px; }
        .center { text-align: center; }
        .back-btn { margin-top: 18px; padding: 10px 18px; font-size: 16px; border: none; border-radius: 8px; cursor: pointer; background: #1f4bb8; color: white; }
        .back-btn:hover { background: #183b8f; }
    </style>
</head>
<body>
    <header>
        <h1>Progress Dashboard</h1>
    </header>
    <main class="container">
        <h2>Your Progress</h2>
        {% if progress %}
        <table>
            <tr>
                <th>Topic</th>
                <th>Completed</th>
                <th>Total</th>
                <th>Progress</th>
            </tr>
            {% for topic_id, data in progress.items() %}
            <tr>
                <td>{{ data.title }}</td>
                <td class="center">{{ data.completed }}</td>
                <td class="center">{{ data.total }}</td>
                <td>
                    <div class="progress-bar-bg">
                        <div class="progress-bar" style="width: {{ (data.completed / data.total * 100) | round(0) }}%;"></div>
                    </div>
                </td>
            </tr>
            {% endfor %}
        </table>
        {% else %}
        <p>No progress data available yet. Start practicing to see your progress!</p>
        {% endif %}
        <form action="/" method="GET">
            <button class="back-btn">&larr; Back to Home</button>
        </form>
    </main>
</body>
</html>
