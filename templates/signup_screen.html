<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - Let's Go Math!</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }
        header {
            background: #1f4bb8;
            color: white;
            padding: 18px 20px;
        }
        .container {
            max-width: 400px;
            margin: 30px auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .subtitle {
            margin-top: 6px;
            opacity: 0.9;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .signup-btn {
            background: #28a745;
            color: white;
        }
        .back-btn {
            background: #6c757d;
            color: white;
            margin-bottom: 20px;
        }
        button:hover {
            opacity: 0.9;
        }
        .form-section {
            margin: 20px 0;
        }
        .login-link {
            text-align: center;
            margin-top: 15px;
        }
        .login-link a {
            color: #1f4bb8;
            text-decoration: none;
        }
        .login-link a:hover {
            text-decoration: underline;
        }
        footer {
            text-align: center;
            margin: 18px 0 30px;
            color: #6c7384;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="margin: 0; font-size: 24px;">Let's Go Math!</h1>
                <div class="subtitle">Create your account</div>
            </div>
            <nav>
                <a href="/" style="color: white; margin-right: 18px; text-decoration: none; font-weight: bold;">Home</a>
                <a href="/topics" style="color: white; margin-right: 18px; text-decoration: none; font-weight: bold;">Topics</a>
                <a href="/login" style="color: white; text-decoration: none; font-weight: bold;">Sign In</a>
            </nav>
        </div>
    </header>
    
    <main class="container">
        <form action="/" method="GET">
            <button type="submit" class="back-btn">← Back to Home</button>
        </form>
        
        <h2>Sign Up</h2>
        
        <div class="form-section">
            <input type="text" id="firstName" placeholder="First Name" required />
            <input type="text" id="lastName" placeholder="Last Name" required />
            <input type="text" id="username" placeholder="Username" required />
            <input type="email" id="email" placeholder="Email" required />
            <input type="password" id="password" placeholder="Password (min 6 characters)" required />
            
            <button onclick="createAccount()" class="signup-btn">Create Account</button>
        </div>

        <div class="login-link">
            Already have an account? <a href="/login">Sign In</a>
        </div>
    </main>
    
    <footer>
        © 2026 Let's Go Math
    </footer>

<script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyC6L5r62_GVoEWCmkw_hm2Crcu6o5EhwmA",
    authDomain: "lets-go-math.firebaseapp.com",
    projectId: "lets-go-math",
    storageBucket: "lets-go-math.firebasestorage.app",
    messagingSenderId: "358881808064",
    appId: "1:358881808064:web:85550f97b17bdc0d1f6725",
  };
  
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window.createAccount = async function () {
    const firstName = document.getElementById("firstName").value.trim();
    const lastName = document.getElementById("lastName").value.trim();
    const username = document.getElementById("username").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    // Validation
    if (!firstName || !lastName || !username || !email || !password) {
        alert("Please fill in all fields");
        return;
    }

    if (password.length < 6) {
        alert("Password must be at least 6 characters long");
        return;
    }

    if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        alert("Username can only contain letters, numbers, and underscores");
        return;
    }

    try {
        // Create the user account
        const userCred = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCred.user;

        // Update the user's profile
        await updateProfile(user, {
            displayName: `${firstName} ${lastName}`
        });

        // Save additional user info to Firestore
        await setDoc(doc(db, "users", user.uid), {
            firstName: firstName,
            lastName: lastName,
            username: username,
            email: email,
            createdAt: new Date()
        });

        // Get the ID token for session login
        const token = await user.getIdToken();

        const response = await fetch("/api/sessionLogin", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ idToken: token })
        });

        if (response.ok) {
            alert("Account created successfully!");
            window.location.href = "/";
        } else {
            alert("Account created but login failed. Please try signing in.");
            window.location.href = "/login";
        }
    } catch (error) {
        console.error("Error creating account:", error);
        if (error.code === 'auth/email-already-in-use') {
            alert("An account with this email already exists. Please try signing in instead.");
        } else if (error.code === 'auth/weak-password') {
            alert("Password is too weak. Please choose a stronger password.");
        } else if (error.code === 'auth/invalid-email') {
            alert("Please enter a valid email address.");
        } else {
            alert("Error creating account: " + error.message);
        }
    }
  };
</script>
</body>
</html>
