<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset ="UTF-8" />
    <meta name ="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Let's Go Math!</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fb;
            margin: 0;
            padding: 0;
        }
        header {
            background: #1f4bb8;
            color: white;
            padding: 18px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-left {
            flex-grow: 1;
        }
        .header-right {
            flex-shrink: 0;
        }
        .header-signin-btn {
            background: #28a745;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        .header-signin-btn:hover {
            background: #218838;
        }
        .container {
            max-width: 700px;
            margin: 30px auto;
            background: white;
            padding: 24px;
            border-radius: 10px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.08);
        }
        h1 {
            margin: 0;
            font-size: 24px;
        }
        .subtitle {
            margin-top: 6px;
            opacity: 0.9;
            font-size: 14px;
        }
        button {
            margin-top: 14px;
            padding: 10px 14px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background: #1f4bb8;
            color: white;
        }
        button:hover {
            background: #183b8f;
        }
        footer {
            text-align: center;
            margin: 18px 0 30px;
            color: #6c7384;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <h1>Welcome to Let's Go Math!</h1>
            <div class="subtitle">Algebra Practice</div>
        </div>
        <div class="header-right">
            <form action="/login" method="GET" style="margin: 0;">
                <button type="submit" class="header-signin-btn">Sign In</button>
            </form>
        </div>
    </header>
    <main class="container">
        <h2>Home</h2>
        <p>Practice simple algebra problems and receive instant feedback.</p>

        <form action="/start" method="GET">
            <button type="submit">Start Practice</button>
        </form>
    </main>
    <footer>
        © 2026 Let's Go Math
    </footer>
</body>
</html>
